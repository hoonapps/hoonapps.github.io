name: "AI Radar"

on:
  schedule:
    # 08:20 KST
    - cron: "20 23 * * *"
  workflow_dispatch:
    inputs:
      create_draft:
        description: "Create a Markdown draft from today's radar candidates"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  update-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect AI Radar candidates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(--days 7 --limit 12 --write-data)
          if [ "${{ inputs.create_draft }}" = "true" ]; then
            args+=(--draft)
          fi
          python tools/ai_radar.py "${args[@]}"

      - name: Commit radar update
        run: |
          if git diff --quiet -- _data/ai_radar.yml _drafts; then
            echo "No radar changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/ai_radar.yml _drafts
          git commit -m "chore: update AI radar"
          git push

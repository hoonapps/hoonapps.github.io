backend_core:
  - name: "데이터 정합성"
    description: "트랜잭션, 락, outbox, idempotency, isolation level을 실무 장애 관점에서 다룬다."
    status: "active"
  - name: "성능과 확장"
    description: "인덱스, 쿼리 플랜, 캐시, queue, backpressure, load balancing을 측정 중심으로 정리한다."
    status: "planned"
  - name: "운영과 관측성"
    description: "log, metric, trace, alert, SLO, 장애 대응 runbook을 서비스 운영 기준으로 다룬다."
    status: "planned"
  - name: "보안과 권한"
    description: "인증, 인가, secret, multi-tenant isolation, audit trail을 백엔드 경계로 해석한다."
    status: "planned"
ai_systems:
  - name: "Agent Backend"
    description: "에이전트 실행, 권한, sandbox, tool calling, human-in-the-loop 구조를 검증한다."
    status: "active"
  - name: "RAG Architecture"
    description: "chunking, embedding, vector store, reranking, eval, freshness를 제품 요구사항과 연결한다."
    status: "planned"
  - name: "LLM Ops"
    description: "비용, latency, fallback, prompt/version 관리, regression eval을 운영 관점에서 본다."
    status: "planned"

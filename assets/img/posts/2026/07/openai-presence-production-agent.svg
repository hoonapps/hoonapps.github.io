<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Presence production agent diagram</title>
  <desc id="desc">A dark interface-style diagram showing policies, guardrails, approved actions, evaluation, escalation, and improvement loop around a production AI agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.48" stop-color="#121820"/>
      <stop offset="1" stop-color="#0a0f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#18c8b8"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.18">
    <path d="M0 540 C210 480 310 610 510 532 C690 462 784 320 1010 388 C1120 422 1166 388 1200 360" fill="none" stroke="#18c8b8" stroke-width="2"/>
    <path d="M0 116 C180 172 340 40 520 104 C720 174 842 128 1000 80 C1090 52 1152 82 1200 116" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <g transform="translate(72 68)">
    <text x="0" y="0" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800">OpenAI Presence</text>
    <text x="2" y="42" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="22">production agent needs more than a model</text>
  </g>
  <g transform="translate(88 162)" filter="url(#soft)">
    <rect x="0" y="0" width="1024" height="352" rx="24" fill="#101820" stroke="#273241"/>
    <g transform="translate(388 72)">
      <rect x="0" y="0" width="248" height="168" rx="24" fill="#121f2a" stroke="#18c8b8" stroke-width="2"/>
      <circle cx="124" cy="58" r="28" fill="url(#accent)"/>
      <path d="M86 116 H162 M104 138 H144" stroke="#e5e7eb" stroke-width="8" stroke-linecap="round"/>
      <text x="124" y="204" text-anchor="middle" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Production Agent</text>
    </g>
    <g font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">
      <g transform="translate(56 54)">
        <rect width="242" height="76" rx="16" fill="#0d141c" stroke="#334155"/>
        <text x="28" y="47" fill="#e5e7eb">Policies</text>
      </g>
      <g transform="translate(56 222)">
        <rect width="242" height="76" rx="16" fill="#0d141c" stroke="#334155"/>
        <text x="28" y="47" fill="#e5e7eb">Guardrails</text>
      </g>
      <g transform="translate(726 54)">
        <rect width="242" height="76" rx="16" fill="#0d141c" stroke="#334155"/>
        <text x="28" y="47" fill="#e5e7eb">Approved Actions</text>
      </g>
      <g transform="translate(726 222)">
        <rect width="242" height="76" rx="16" fill="#0d141c" stroke="#334155"/>
        <text x="28" y="47" fill="#e5e7eb">Escalation</text>
      </g>
    </g>
    <g stroke="#18c8b8" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <path d="M300 92 H382"/>
      <path d="M300 260 H382"/>
      <path d="M642 92 H724"/>
      <path d="M642 260 H724"/>
    </g>
  </g>
  <g transform="translate(164 554)" font-family="Inter, Arial, sans-serif" font-size="19" fill="#9ca3af">
    <text>Simulations</text>
    <circle cx="150" cy="-7" r="4" fill="#18c8b8"/>
    <text x="174">Evaluations</text>
    <circle cx="316" cy="-7" r="4" fill="#18c8b8"/>
    <text x="340">Production Sessions</text>
    <circle cx="552" cy="-7" r="4" fill="#18c8b8"/>
    <text x="576">Codex-powered Improvement Loop</text>
  </g>
</svg>

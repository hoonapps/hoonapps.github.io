<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Palantir FDE operating model diagram</title>
  <desc id="desc">A dark diagram showing a forward deployed engineer moving between customer operations, production workflows, ontology, platform feedback, and product hardening.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#060a0f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.2" stroke-width="2" fill="none">
    <path d="M74 506 C264 430 322 590 510 504 C678 428 762 282 958 342 C1074 378 1136 342 1184 294" stroke="#38bdf8"/>
    <path d="M38 132 C186 210 334 64 504 118 C680 174 796 124 982 84 C1086 62 1144 86 1188 122" stroke="#a7f3d0"/>
  </g>
  <g transform="translate(72 72)">
    <text x="0" y="0" fill="#f3f4f6" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">Forward Deployed Engineering</text>
    <text x="2" y="42" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="22">field work becomes product structure</text>
  </g>
  <g transform="translate(86 164)" filter="url(#shadow)">
    <rect x="0" y="0" width="1028" height="346" rx="24" fill="#0f1720" stroke="#2a3645"/>
    <g font-family="Inter, Arial, sans-serif">
      <g transform="translate(58 72)">
        <rect width="238" height="92" rx="18" fill="#111c26" stroke="#334155"/>
        <text x="28" y="38" fill="#f3f4f6" font-size="23" font-weight="700">Customer Reality</text>
        <text x="28" y="66" fill="#9ca3af" font-size="16">messy data, real workflows</text>
      </g>
      <g transform="translate(386 48)">
        <rect width="256" height="140" rx="22" fill="#10202b" stroke="#38bdf8" stroke-width="2"/>
        <circle cx="128" cy="46" r="24" fill="url(#line)"/>
        <path d="M92 96 H164 M108 118 H148" stroke="#f3f4f6" stroke-width="7" stroke-linecap="round"/>
        <text x="128" y="174" text-anchor="middle" fill="#f3f4f6" font-size="26" font-weight="800">FDE</text>
      </g>
      <g transform="translate(732 72)">
        <rect width="238" height="92" rx="18" fill="#111c26" stroke="#334155"/>
        <text x="28" y="38" fill="#f3f4f6" font-size="23" font-weight="700">Production Workflow</text>
        <text x="28" y="66" fill="#9ca3af" font-size="16">working software in context</text>
      </g>
      <g transform="translate(222 248)">
        <rect width="238" height="76" rx="18" fill="#0c141c" stroke="#334155"/>
        <text x="28" y="46" fill="#f3f4f6" font-size="22" font-weight="700">Ontology</text>
      </g>
      <g transform="translate(570 248)">
        <rect width="238" height="76" rx="18" fill="#0c141c" stroke="#334155"/>
        <text x="28" y="46" fill="#f3f4f6" font-size="22" font-weight="700">Product Hardening</text>
      </g>
    </g>
    <g stroke="url(#line)" stroke-width="3" stroke-linecap="round" opacity="0.86">
      <path d="M300 118 H382"/>
      <path d="M646 118 H728"/>
      <path d="M512 194 V240"/>
      <path d="M462 286 H566"/>
      <path d="M690 248 C682 212 650 194 606 170"/>
      <path d="M342 248 C350 212 382 194 426 170"/>
    </g>
  </g>
  <g transform="translate(118 560)" font-family="Inter, Arial, sans-serif" font-size="19" fill="#9ca3af">
    <text>Embed</text>
    <circle cx="96" cy="-7" r="4" fill="#38bdf8"/>
    <text x="120">Build</text>
    <circle cx="206" cy="-7" r="4" fill="#38bdf8"/>
    <text x="230">Ship</text>
    <circle cx="310" cy="-7" r="4" fill="#38bdf8"/>
    <text x="334">Measure</text>
    <circle cx="448" cy="-7" r="4" fill="#38bdf8"/>
    <text x="472">Turn field patterns into platform capabilities</text>
  </g>
</svg>
